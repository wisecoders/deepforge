apiVersion: v1
kind: Secret
metadata:
  name: deepforge-secrets
  namespace: deepforge
type: Opaque
stringData:
  # LLM provider — set one of these based on LLM_PROVIDER
  LLM_PROVIDER: "claude"
  ANTHROPIC_API_KEY: ""
  # OPENAI_API_KEY: ""
  # AZURE_OPENAI_API_KEY: ""
  # AZURE_OPENAI_ENDPOINT: ""
  # AZURE_OPENAI_DEPLOYMENT: ""

  # Git authentication (optional — for private repos)
  # GIT_PAT: ""

  # Azure DevOps Service Principal (alternative to PAT)
  # AZURE_SP_TENANT_ID: ""
  # AZURE_SP_CLIENT_ID: ""
  # AZURE_SP_CLIENT_SECRET: ""
