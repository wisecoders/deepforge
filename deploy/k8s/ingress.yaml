# Ingress configuration for deepforge
# Requires an ingress controller that supports wildcard subdomains
# (e.g., nginx-ingress, traefik, or cloud-specific ALB/Application Gateway)
#
# Two routing patterns:
# 1. api.deepforge.example.com   → controller API (submit repos, check status)
# 2. *.deepforge.example.com     → wiki server (generated documentation)

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deepforge-api
  namespace: deepforge
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: api.deepforge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deepforge-controller
                port:
                  name: api
  tls:
    - hosts:
        - api.deepforge.example.com
      secretName: deepforge-api-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deepforge-wikis
  namespace: deepforge
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      # Cache static wiki content
      add_header Cache-Control "public, max-age=3600";
spec:
  ingressClassName: nginx
  rules:
    # Wildcard subdomain: <slug>.deepforge.example.com
    - host: "*.deepforge.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deepforge-wiki
                port:
                  name: http
  tls:
    - hosts:
        - "*.deepforge.example.com"
      secretName: deepforge-wildcard-tls
