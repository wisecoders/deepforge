# Ingress for local Docker Desktop Kubernetes
# Routes:
#   deepforge.local           → controller API (dashboard + API)
#   <slug>.deepforge.local    → per-wiki pods (created dynamically by controller)

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deepforge-api
  namespace: deepforge
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: deepforge.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deepforge-controller
                port:
                  name: api
