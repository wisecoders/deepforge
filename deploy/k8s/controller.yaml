apiVersion: v1
kind: ServiceAccount
metadata:
  name: deepforge-controller
  namespace: deepforge
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deepforge-controller
  namespace: deepforge
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deepforge-controller
  namespace: deepforge
subjects:
  - kind: ServiceAccount
    name: deepforge-controller
    namespace: deepforge
roleRef:
  kind: Role
  name: deepforge-controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepforge-controller
  namespace: deepforge
  labels:
    app: deepforge-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deepforge-controller
  template:
    metadata:
      labels:
        app: deepforge-controller
    spec:
      serviceAccountName: deepforge-controller
      containers:
        - name: controller
          image: deepforge:latest
          imagePullPolicy: Never
          command: ["node", "dist/controller/server.js"]
          ports:
            - containerPort: 8080
              name: api
          envFrom:
            - secretRef:
                name: deepforge-secrets
          env:
            - name: PORT
              value: "8080"
            - name: DATA_DIR
              value: "/data"
            - name: BASE_DOMAIN
              value: "deepforge.local"
            - name: CONTROLLER_URL
              value: "http://deepforge.local"
            - name: NAMESPACE
              value: "deepforge"
            - name: WIKI_IMAGE
              value: "deepforge:latest"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: deepforge-data
---
apiVersion: v1
kind: Service
metadata:
  name: deepforge-controller
  namespace: deepforge
spec:
  selector:
    app: deepforge-controller
  ports:
    - name: api
      port: 80
      targetPort: 8080
