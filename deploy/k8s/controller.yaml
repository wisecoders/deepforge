apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepforge-controller
  namespace: deepforge
  labels:
    app: deepforge-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deepforge-controller
  template:
    metadata:
      labels:
        app: deepforge-controller
    spec:
      containers:
        - name: controller
          image: deepforge:latest
          imagePullPolicy: Never
          command: ["node", "dist/controller/server.js"]
          ports:
            - containerPort: 8080
              name: api
          envFrom:
            - secretRef:
                name: deepforge-secrets
          env:
            - name: PORT
              value: "8080"
            - name: DATA_DIR
              value: "/data"
            - name: BASE_DOMAIN
              value: "deepforge.local"
            - name: CONTROLLER_URL
              value: "http://deepforge.local"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10

        - name: wiki-server
          image: deepforge:latest
          imagePullPolicy: Never
          command: ["node", "dist/controller/wiki-server.js"]
          ports:
            - containerPort: 8081
              name: wiki
          env:
            - name: WIKI_PORT
              value: "8081"
            - name: WIKIS_DIR
              value: "/data/wikis"
            - name: BASE_DOMAIN
              value: "deepforge.local"
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: deepforge-data
---
apiVersion: v1
kind: Service
metadata:
  name: deepforge-controller
  namespace: deepforge
spec:
  selector:
    app: deepforge-controller
  ports:
    - name: api
      port: 80
      targetPort: 8080
    - name: wiki
      port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: deepforge-wiki
  namespace: deepforge
spec:
  selector:
    app: deepforge-controller
  ports:
    - name: http
      port: 80
      targetPort: 8081
